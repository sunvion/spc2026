<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style></style>
</head>
<body>
    <h1>카운트다운</h1>
    <input type="number" id="timeInput" placeholder="초를 입력하세요." min="1">
    <button id="startButton" onclick="startTimer()">시작</button>
    <div>
        <p id="timerDisplay"><!-- 카운트다운을 출력함 --></p>
    </div>

    <script>
        function startTimer() {
            // 1. 입력값을 가져온다
            // 2. setInterval()을 통해서 매초 카운트다운을 한다.
            // 3. 남은 초를 DOM(p태그)에다가 출력한다.
            // 4. 시간이 만료했으면 끝났다고 출력한다.
            let inputValue = parseInt(document.getElementById('timeInput').value);
            const timerDisplay = document.getElementById('timerDisplay');
            const startButton = document.getElementById('startButton')
            
            const timerId = setInterval(() => {
                if(inputValue <= 0) {
                    clearInterval(timerId);
                    timerDisplay.textContent = '시간이 종료되었습니다.';
                } else {
                    timerDisplay.textContent = `${inputValue}초가 남았습니다.`;
                    inputValue--;
                }
            }, 1000);
        }

    </script>
</body>
</html>
