<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chart.js Example</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div>
        <canvas id="myChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('myChart');
        // 📊 데이터 (그래프에 표시될 값)
        const data = {
            labels: ['1월', '2월', '3월', '4월', '5월', '6월', '7월'],
            datasets: [{
                label: '내 첫 번째 데이터셋',
                data: [65, 59, 80, 81, 56, 55, 40],

                // 🎨 막대 배경색
                backgroundColor: [
                    'rgba(255, 99, 132, 0.2)',
                    'rgba(255, 159, 64, 0.2)',
                    'rgba(255, 205, 86, 0.2)',
                    'rgba(75, 192, 192, 0.2)',
                    'rgba(54, 162, 235, 0.2)',
                    'rgba(153, 102, 255, 0.2)',
                    'rgba(201, 203, 207, 0.2)'
                ],

                // 🖊️ 테두리 색상
                borderColor: [
                    'rgb(255, 99, 132)',
                    'rgb(255, 159, 64)',
                    'rgb(255, 205, 86)',
                    'rgb(75, 192, 192)',
                    'rgb(54, 162, 235)',
                    'rgb(153, 102, 255)',
                    'rgb(201, 203, 207)'
                ],

                borderWidth: 1
            }]
        };

        // ⚙️ 차트 설정
        const config = {
            type: 'bar',   // 📊 막대그래프
            data: data,
            options: {
                scales: {
                    y: {
                        beginAtZero: true // 📉 Y축을 0부터 시작
                    }
                }
            }
        };

        // 🚀 차트 생성
        new Chart(document.getElementById('myChart'), config);
    </script>
</body>

</html>
