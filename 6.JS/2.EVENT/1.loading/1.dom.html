<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // HTML에 대한 DOM 로딩이 완료된 시점. (CSS, Image 등은 로딩이 완료 안됐을 수 있음.)
            console.log('DOM 로딩 완료');
        })
    </script>
</body>
</html>
