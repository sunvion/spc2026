<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="text-2xl font-bold">버튼들</h1>
    <div class="p-4 space-y-4">
        <!-- 배경색: bg-{color}-{number}, bg-transparent, bg-white, bg-black -->
        <!-- 글자색: text-{color}-{number}, text-transparent, text-white, text-black -->
        <!-- 글자모양: text-sm, text-lg, text-xl -->
        <!-- 테두리: border-{color}-{number} -->
        <!-- 테두리: border-t, border-b, border-l, border-r 특정 방향만 보더 넣기 -->
        <!-- 테두리: rounded, rounded-lg, rounded-full -->
        <!-- 테두리: shadow, shadow-md, shadow-lg -->
        <!-- 여백: m-{number} m-4, p-{number} p-4 -->
        <!-- 여백: mt-{number}, mb-{number}, ml-{number}, top/bottom/right/left -->         
        <!-- 여백: mx-{number}, my-{number}, 좌우/상하 -->         
        <p class="text-red-1000">빨간색</p>
        <p class="text-red-900 border border-blue-500 m-4 p-4 rounded-full shadow">빨간색</p>
        <p class="text-red-800 border border-blue-400 ml-4 pl-8">빨간색</p>
        <p class="text-red-700 border border-blue-300 ml-6 pl-6">빨간색</p>
        <p class="text-red-600 border border-yellow-500 ml-8 pl-4">빨간색</p>
        <p class="text-red-500 border border-yellow-600 text-lg">빨간색</p>
        <p class="text-red-400 border border-yellow-700 text-xl">빨간색</p>
        <p class="text-red-300">빨간색</p>
        <button class="bg-blue-500 hover:bg-blue-700 py-2 px-4 rounded font-bold text-white">버튼1</button>
        <button class="bg-blue-400 hover:bg-blue-600 py-2 px-4 rounded font-bold text-white">버튼1</button>
        <button class="bg-blue-300 hover:bg-blue-500 py-2 px-4 rounded font-bold">버튼1</button>
        <button class="bg-blue-200 hover:bg-blue-400 py-2 px-4 rounded font-bold">버튼1</button>
        <button class="bg-blue-100 hover:bg-blue-300 py-2 px-4 rounded font-bold">버튼1</button>
    </div>
    <div class="p-4 space-y-4">
        <button class="bg-green-500 hover:bg-green-700 py-2 px-4 rounded font-bold text-white">버튼1</button>
        <button class="bg-green-400 hover:bg-green-600 py-2 px-4 rounded font-bold text-white">버튼1</button>
        <button class="bg-green-300 hover:bg-green-500 py-2 px-4 rounded font-bold">버튼1</button>
        <button class="bg-green-200 hover:bg-green-400 py-2 px-4 rounded font-bold">버튼1</button>
        <button class="bg-green-100 hover:bg-green-300 py-2 px-4 rounded font-bold">버튼1</button>
    </div>
    <div class="p-4 space-y-4">
        <button class="bg-red-500 hover:bg-red-700 py-2 px-4 rounded font-bold text-white">버튼1</button>
        <button class="bg-red-400 hover:bg-red-600 py-2 px-4 rounded font-bold text-white">버튼1</button>
        <button class="bg-red-300 hover:bg-red-500 py-2 px-4 rounded font-bold">버튼1</button>
        <button class="bg-red-200 hover:bg-red-400 py-2 px-4 rounded font-bold">버튼1</button>
        <button class="bg-red-100 hover:bg-red-300 py-2 px-4 rounded font-bold">버튼1</button>
    </div>
  </body>
</html>
