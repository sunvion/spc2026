<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Login</title>
</head>

<body class="h-screen flex items-center justify-center bg-white">

  <!-- Login Card -->
  <div class="w-[35%] min-w-[320px] p-10 rounded-2xl
              bg-white shadow-[12px_12px_30px_rgba(0,0,0,0.15)]">

    <h2 class="text-2xl font-bold text-center mb-8 text-gray-800">
      Login
    </h2>

    <!-- Username -->
    <input
      type="text"
      placeholder="Username"
      class="w-full p-3 mb-4 border border-gray-200 rounded-lg
             outline-none focus:ring-2 focus:ring-blue-400 transition"
    />

    <!-- Password -->
    <input
      type="password"
      placeholder="Password"
      class="w-full p-3 mb-6 border border-gray-200 rounded-lg
             outline-none focus:ring-2 focus:ring-blue-400 transition"
    />

    <!-- Button -->
    <button
      class="w-full py-3 rounded-lg bg-gray-900 text-white font-semibold
             hover:bg-gray-800 transition"
    >
      로그인
    </button>

  </div>

</body>
</html>
