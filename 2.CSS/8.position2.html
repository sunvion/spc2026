<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .bg {
            height: 300px;
            background-color: orange;
        }
        .center {
            background-color: orangered;
        }
        .fixed {
            width: 100px;
            height: 100px;
            /* background-color: teal; */
            background-color: black;
            background-image: url(images/starbucks.png);
            background-size: 100% 100%;
            position: fixed;
            bottom: 50px;
            right: 50px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bg center"></div>
    <div class="bg"></div>
    <div class="fixed"></div>
    <script>
        const elem = document.querySelector('.fixed');

        elem.onclick = () => {
            elem.style.transform = elem.style.transform === 'scale(0.2)' ?
            'scale(1)' : 'scale(0.2)';
        } 
    </script>
</body>
</html>
