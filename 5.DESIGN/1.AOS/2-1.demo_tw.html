<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tailwind + AOS Scroll Demo</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    html, body {
      scroll-behavior: smooth;
    }
  </style> 
</head>

<body class="bg-gray-950 text-white">

<!-- HERO -->
<section class="h-screen flex items-center justify-center bg-gradient-to-br from-purple-700 via-pink-600 to-red-500">
  <div class="text-center" data-aos="zoom-in">
    <h1 class="text-5xl font-bold">Tailwind + AOS Demo</h1>
    <p class="mt-4 text-lg opacity-80">스크롤하면서 다양한 애니메이션을 확인해보세요</p>
  </div>
</section>

<!-- SECTION 1 -->
<section class="h-[600px] flex items-center justify-center bg-gray-900">
  <div class="text-center" data-aos="fade-up">
    <h2 class="text-4xl font-bold">Fade Up</h2>
    <p class="mt-2 text-gray-400">기본적인 등장 애니메이션</p>
  </div>
</section>

<!-- SECTION 2 -->
<section class="h-[600px] flex items-center justify-center bg-gray-800">
  <div data-aos="fade-right" class="bg-indigo-600 p-10 rounded-2xl shadow-xl">
    <h2 class="text-3xl font-bold">Slide Right</h2>
  </div>
</section>

<!-- SECTION 3 -->
<section class="h-[600px] flex items-center justify-center bg-gray-900">
  <div data-aos="fade-left" class="bg-green-500 p-10 rounded-2xl shadow-xl">
    <h2 class="text-3xl font-bold">Slide Left</h2>
  </div>
</section>

<!-- SECTION 4 -->
<section class="h-[600px] flex items-center justify-center bg-gray-800">
  <div data-aos="zoom-in-up" class="bg-pink-500 p-10 rounded-2xl shadow-xl">
    <h2 class="text-3xl font-bold">Zoom In Up</h2>
  </div>
</section>

<!-- SECTION 5 (GRID CARDS) -->
<section class="min-h-[800px] bg-gray-950 py-20">
  <div class="text-center mb-10" data-aos="fade-down">
    <h2 class="text-4xl font-bold">Card Grid Animation</h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 px-10">
    
    <div class="bg-gray-800 p-6 rounded-xl" data-aos="flip-left">
      Card 1
    </div>

    <div class="bg-gray-800 p-6 rounded-xl" data-aos="flip-right">
      Card 2
    </div>

    <div class="bg-gray-800 p-6 rounded-xl" data-aos="flip-up">
      Card 3
    </div>

    <div class="bg-gray-800 p-6 rounded-xl" data-aos="zoom-in">
      Card 4
    </div>

    <div class="bg-gray-800 p-6 rounded-xl" data-aos="fade-up-right">
      Card 5
    </div>

    <div class="bg-gray-800 p-6 rounded-xl" data-aos="fade-up-left">
      Card 6
    </div>
  </div>
</section>

<!-- SECTION 6 (PARALLAX 느낌) -->
<section class="h-[800px] flex items-center justify-center bg-gradient-to-r from-blue-900 to-black">
  <div data-aos="zoom-out" class="text-center">
    <h2 class="text-5xl font-bold">Zoom Out Effect</h2>
    <p class="mt-3 text-gray-300">스크롤할수록 줄어드는 느낌</p>
  </div>
</section>

<!-- SECTION 7 (LEFT-RIGHT SPLIT) -->
<section class="h-[700px] flex">
  <div class="w-1/2 bg-purple-700 flex items-center justify-center" data-aos="fade-right">
    <h2 class="text-3xl font-bold">Left Side</h2>
  </div>
  <div class="w-1/2 bg-indigo-900 flex items-center justify-center" data-aos="fade-left">
    <h2 class="text-3xl font-bold">Right Side</h2>
  </div>
</section>

<!-- SECTION 8 (FINAL CTA) -->
<section class="h-screen flex items-center justify-center bg-gradient-to-br from-black via-gray-900 to-purple-900">
  <div class="text-center" data-aos="zoom-in">
    <h2 class="text-5xl font-bold">끝!</h2>
    <p class="mt-4 text-gray-400">AOS + Tailwind 조합으로 다양한 연출 가능</p>
  </div>
</section>

<!-- AOS JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000,
    once: false,
    mirror: true
  });
</script>

</body>
</html>

<!-- 입력한 프롬프트 : tailwindcss랑 aos (animate on scroll) 을 합쳐서 화면을 스크롤 할때 나타나는 다양한 예제들을 살펴보고 싶어.. 그래서 이 두개를 합쳐서 화려하게 디자인을 넣고 스크롤에 따라 다양한 동작이 나타나게 해줘.. 최소한 2000px 이상의 height로 기본 사이즈를 잡고, 예제가 많으면 3000~4000으로 더 늘려도 돼... -->
