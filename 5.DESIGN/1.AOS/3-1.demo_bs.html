<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bootstrap + AOS Scroll Demo</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      background: #0b0f19;
      color: white;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(135deg, #6f42c1, #d63384, #dc3545);
    }

    .section-dark {
      background: #111827;
    }

    .section-darker {
      background: #0b0f19;
    }

    .box {
      border-radius: 16px;
      padding: 40px;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero d-flex align-items-center justify-content-center text-center">
  <div data-aos="zoom-in">
    <h1 class="display-3 fw-bold">Bootstrap + AOS</h1>
    <p class="lead mt-3">스크롤하면서 애니메이션을 확인하세요</p>
  </div>
</section>

<!-- SECTION 1 -->
<section class="section-dark d-flex align-items-center justify-content-center" style="height:600px;">
  <div data-aos="fade-up">
    <h2 class="display-5">Fade Up</h2>
    <p class="text-secondary text-center">기본 등장 애니메이션</p>
  </div>
</section>

<!-- SECTION 2 -->
<section class="section-darker d-flex align-items-center justify-content-center" style="height:600px;">
  <div class="box bg-primary" data-aos="fade-right">
    <h2>Slide Right</h2>
  </div>
</section>

<!-- SECTION 3 -->
<section class="section-dark d-flex align-items-center justify-content-center" style="height:600px;">
  <div class="box bg-success" data-aos="fade-left">
    <h2>Slide Left</h2>
  </div>
</section>

<!-- SECTION 4 -->
<section class="section-darker d-flex align-items-center justify-content-center" style="height:600px;">
  <div class="box bg-danger" data-aos="zoom-in-up">
    <h2>Zoom In Up</h2>
  </div>
</section>

<!-- SECTION 5: GRID CARDS -->
<section class="section-dark py-5" style="min-height:900px;">
  <div class="container">

    <div class="text-center mb-5" data-aos="fade-down">
      <h2 class="display-5">Bootstrap Grid Cards</h2>
    </div>

    <div class="row g-4">

      <div class="col-md-4" data-aos="flip-left">
        <div class="card bg-dark text-white p-4 border-0 shadow">
          Card 1
        </div>
      </div>

      <div class="col-md-4" data-aos="flip-right">
        <div class="card bg-dark text-white p-4 border-0 shadow">
          Card 2
        </div>
      </div>

      <div class="col-md-4" data-aos="flip-up">
        <div class="card bg-dark text-white p-4 border-0 shadow">
          Card 3
        </div>
      </div>

      <div class="col-md-4" data-aos="zoom-in">
        <div class="card bg-dark text-white p-4 border-0 shadow">
          Card 4
        </div>
      </div>

      <div class="col-md-4" data-aos="fade-up-right">
        <div class="card bg-dark text-white p-4 border-0 shadow">
          Card 5
        </div>
      </div>

      <div class="col-md-4" data-aos="fade-up-left">
        <div class="card bg-dark text-white p-4 border-0 shadow">
          Card 6
        </div>
      </div>

    </div>
  </div>
</section>

<!-- SECTION 6 -->
<section class="section-darker d-flex align-items-center justify-content-center" style="height:800px;">
  <div class="text-center" data-aos="zoom-out">
    <h2 class="display-4">Zoom Out Effect</h2>
    <p class="text-secondary">스크롤할수록 축소되는 느낌</p>
  </div>
</section>

<!-- SECTION 7 SPLIT -->
<section style="height:700px;">
  <div class="row h-100 m-0">

    <div class="col-md-6 d-flex align-items-center justify-content-center bg-primary"
         data-aos="fade-right">
      <h2>Left Side</h2>
    </div>

    <div class="col-md-6 d-flex align-items-center justify-content-center bg-dark"
         data-aos="fade-left">
      <h2>Right Side</h2>
    </div>

  </div>
</section>

<!-- FINAL -->
<section class="hero d-flex align-items-center justify-content-center text-center">
  <div data-aos="zoom-in">
    <h1 class="display-3 fw-bold">END</h1>
    <p class="text-light">Bootstrap + AOS로 충분히 화려한 UI 가능</p>
  </div>
</section>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- AOS JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
  AOS.init({
    duration: 1000,
    once: false,
    mirror: true
  });
</script>

</body>
</html>
