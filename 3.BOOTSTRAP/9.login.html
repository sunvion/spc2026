<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      background: #ffffff;
    }

    /* 🔥 로그인 카드 (화이트) */
    .login-box {
      width: 35%;
      min-width: 320px;

      background: #ffffff;

      /* 부드러운 그림자 (오른쪽 아래 느낌 유지) */
      box-shadow: 12px 12px 30px rgba(0, 0, 0, 0.15);

      border-radius: 20px;
    }

    .login-box input {
      border-radius: 10px;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center">

  <div class="login-box p-5">

    <h2 class="text-center mb-4">Login</h2>

    <!-- Username -->
    <div class="mb-3">
      <input type="text" class="form-control p-3" placeholder="Username">
    </div>

    <!-- Password -->
    <div class="mb-4">
      <input type="password" class="form-control p-3" placeholder="Password">
    </div>

    <!-- Button -->
    <button class="btn btn-dark w-100 p-2 fw-bold">
      로그인
    </button>

  </div>

</body>
</html>
